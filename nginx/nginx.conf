events {}

http {
    server {
        listen 80;

        location /releases {
            alias /usr/share/nginx/html/releases;
            autoindex on;
        }

        location /UZvgJNxe/releases {
            alias /usr/share/nginx/html/releases;
            autoindex on;
        }

        location / {
            proxy_pass http://backend:5000;
        }
    }
}
