name: Deploy to VPS & Publish Desktop App

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/library-management-system || exit 1
            git fetch origin main || exit 1
            git reset --hard origin/main || exit 1
            docker compose up -d --build || exit 1
            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 30); do
              if docker exec backend curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "Backend is healthy."
                exit 0
              fi
              sleep 2
            done
            echo "Backend health check timed out. Checking logs..."
            docker logs backend --tail 50
            exit 1

  build-and-publish:
    needs: deploy-backend
    if: ${{ always() }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Push version tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "CI Bot"
          git config user.email "ci@coffeeaurkitaab.co.in"
          git tag -f "v$VERSION"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "v$VERSION"
        working-directory: desktop-app

      - name: Build frontend
        run: npm run build
        working-directory: desktop-app
        env:
          VITE_API_BASE_URL: https://coffeeaurkitaab.co.in/api

      - name: Delete existing release for this tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release delete "v$VERSION" --yes --repo ${{ github.repository }} 2>/dev/null || true
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & publish Electron app to GitHub Releases
        run: npx electron-builder --win --publish always
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
