name: Deploy to VPS & Publish Desktop App

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          retry: 2
          script: |
            cd ~/apps/library-management-system
            git pull
            docker compose up -d --build

  build-and-publish:
    needs: deploy-backend
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Push version tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "CI Bot"
          git config user.email "ci@coffeeaurkitaab.co.in"
          git tag -f "v$VERSION"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "v$VERSION"
        working-directory: desktop-app

      - name: Build frontend
        run: npm run build
        working-directory: desktop-app
        env:
          VITE_API_BASE_URL: https://coffeeaurkitaab.co.in/api

      - name: Package & publish Electron app to GitHub Releases
        run: npx electron-builder --win --publish always
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}