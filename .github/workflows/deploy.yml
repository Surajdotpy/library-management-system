name: Deploy to VPS & Publish Desktop App

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          retry: 2
          script: |
            cd ~/apps/library-management-system
            git pull
            docker compose up -d --build

  build-desktop:
    needs: deploy-backend
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Build Electron app
        run: npm run electron:build --win
        working-directory: desktop-app
        env:
          VITE_API_BASE_URL: https://coffeeaurkitaab.co.in/api

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release
          path: desktop-app/release/*

  upload-to-vps:
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-release
          path: release

      - name: Setup SSH key & Upload to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          for i in 1 2 3; do
            ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts && break
            echo "ssh-keyscan attempt $i failed, retrying..." && sleep 3
          done
          for i in 1 2 3; do
            timeout 900 scp -r release/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/apps/library-management-system/releases/ && break
            echo "SCP attempt $i failed, retrying..." && sleep 3
          done