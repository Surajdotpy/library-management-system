name: Build Desktop App

on:
  push:
    branches:
      - main
    paths:
      - 'desktop-app/**'

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Build frontend
        run: npm run build
        working-directory: desktop-app
        env:
          VITE_API_BASE_URL: https://coffeeaurkitaab.co.in/api

      - name: Package & publish
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            npx electron-builder --win --publish always && exit 0
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          exit 1
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
